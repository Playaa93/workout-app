<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Graal — Hors ligne</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;min-height:100dvh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#09090b;color:#a1a1aa;
      font-family:system-ui,-apple-system,sans-serif;
      gap:20px;padding:24px;text-align:center;
    }
    svg{opacity:.55}
    h1{color:#d4af37;font-size:1.1rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase}
    p{font-size:.875rem;line-height:1.6;max-width:280px;color:#71717a}
    button{
      margin-top:8px;padding:12px 36px;
      background:transparent;border:1px solid #d4af37;color:#d4af37;
      border-radius:12px;font-size:.875rem;font-weight:500;cursor:pointer;
    }
    button:active{opacity:.6}
  </style>
</head>
<body>
  <svg width="56" height="56" viewBox="0 0 512 512">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8c54a"/><stop offset="100%" stop-color="#b8922a"/></linearGradient></defs>
    <polygon points="256,80 396,148 396,364 256,432 116,364 116,148" fill="none" stroke="url(#g)" stroke-width="6"/>
    <path d="M216 190 h80 l-10 76 c-2 18-16 28-30 28s-28-10-30-28Z" fill="url(#g)"/>
    <rect x="248" y="294" width="16" height="28" fill="url(#g)"/>
    <rect x="228" y="318" width="56" height="8" rx="4" fill="url(#g)"/>
  </svg>
  <h1>Graal</h1>
  <p>Vous êtes actuellement hors ligne. Vos données locales sont sauvegardées et se synchroniseront automatiquement.</p>
  <button onclick="location.reload()">Réessayer</button>
</body>
</html>
