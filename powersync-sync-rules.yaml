# PowerSync Sync Rules
# Upload to PowerSync Cloud dashboard

bucket_definitions:
  # =====================================================
  # USER-SCOPED DATA (filtered by user_id)
  # =====================================================
  user_data:
    parameters: SELECT token_parameters.user_id as user_id
    data:
      # Users (exclude password_hash)
      - SELECT id, email, display_name, avatar_url, created_at, updated_at, last_login_at, is_active
        FROM users
        WHERE id = bucket.user_id

      # User settings (exclude sensitive fields)
      - SELECT id, user_id, language, theme, notifications_enabled, unit_system,
               huawei_client_id, huawei_token_expires_at, created_at, updated_at
        FROM user_settings
        WHERE user_id = bucket.user_id

      # Morpho profiles
      - SELECT id, user_id, primary_morphotype, secondary_morphotype, morphotype_score,
               wrist_circumference, ankle_circumference, bone_structure,
               torso_proportion, arm_proportion, leg_proportion,
               strengths, weaknesses, recommended_exercises, exercises_to_avoid,
               questionnaire_responses, created_at, updated_at
        FROM morpho_profiles
        WHERE user_id = bucket.user_id

      # Measurements
      - SELECT id, user_id, measured_at, height, weight, body_fat_percentage,
               neck, shoulders, chest, left_arm, right_arm, left_forearm, right_forearm,
               waist, abdomen, hips, glutes, left_thigh, right_thigh,
               left_calf, right_calf, wrist, ankle, notes, created_at
        FROM measurements
        WHERE user_id = bucket.user_id

      # Progress photos
      - SELECT id, user_id, photo_url, thumbnail_url, photo_type, taken_at,
               measurement_id, notes, created_at
        FROM progress_photos
        WHERE user_id = bucket.user_id

      # Workout templates
      - SELECT id, user_id, name, description, target_muscles,
               estimated_duration, is_public, created_at, updated_at
        FROM workout_templates
        WHERE user_id = bucket.user_id

      # Workout sessions
      - SELECT id, user_id, template_id, started_at, ended_at, duration_minutes,
               total_volume, calories_burned, perceived_difficulty, energy_level,
               mood, notes, is_boss_fight, boss_fight_completed, session_type,
               cardio_activity, distance_meters, avg_pace_seconds_per_km,
               avg_speed_kmh, avg_heart_rate, max_heart_rate, created_at
        FROM workout_sessions
        WHERE user_id = bucket.user_id

      # Personal records
      - SELECT id, user_id, exercise_id, record_type, value, workout_set_id, achieved_at
        FROM personal_records
        WHERE user_id = bucket.user_id

      # User exercise notes
      - SELECT id, user_id, exercise_id, notes, updated_at
        FROM user_exercise_notes
        WHERE user_id = bucket.user_id

      # Food entries
      - SELECT id, user_id, food_id, craving_id, custom_name, logged_at,
               meal_type, quantity, serving_size, calories, protein,
               carbohydrates, fat, photo_url, recognized_by_ai, ai_confidence,
               is_cheat, notes, created_at
        FROM food_entries
        WHERE user_id = bucket.user_id

      # Nutrition daily summary
      - SELECT id, user_id, date, total_calories, total_protein, total_carbs, total_fat,
               avg_7d_calories, avg_7d_protein, avg_7d_carbs, avg_7d_fat, entries_count
        FROM nutrition_daily_summary
        WHERE user_id = bucket.user_id

      # Nutrition profiles
      - SELECT id, user_id, goal, activity_level, height, weight, age, is_male,
               tdee, target_calories, target_protein, target_carbs, target_fat,
               created_at, updated_at
        FROM nutrition_profiles
        WHERE user_id = bucket.user_id

      # Gamification
      - SELECT id, user_id, total_xp, current_level, xp_to_next_level,
               current_streak, longest_streak, streak_freeze_available,
               last_activity_date, avatar_stage, avatar_customization,
               created_at, updated_at
        FROM user_gamification
        WHERE user_id = bucket.user_id

      # XP transactions
      - SELECT id, user_id, amount, reason, reference_type, reference_id, created_at
        FROM xp_transactions
        WHERE user_id = bucket.user_id

      # User achievements
      - SELECT id, user_id, achievement_id, unlocked_at
        FROM user_achievements
        WHERE user_id = bucket.user_id

      # Boss fights
      - SELECT id, user_id, exercise_id, target_weight, target_reps,
               boss_name, boss_level, status, attempts, completed_at,
               winning_set_id, xp_earned, created_at
        FROM boss_fights
        WHERE user_id = bucket.user_id

      # Activity log
      - SELECT id, user_id, activity_type, activity_date, reference_id,
               metadata, created_at
        FROM activity_log
        WHERE user_id = bucket.user_id

  # =====================================================
  # CHILD TABLES (via parent ownership - separate buckets)
  # =====================================================

  # Workout sets: one bucket per session owned by user
  user_sets:
    parameters: SELECT id as session_id FROM workout_sessions WHERE user_id = token_parameters.user_id
    data:
      - SELECT id, session_id, exercise_id, set_number,
               reps, weight, rpe, is_warmup, is_pr,
               rest_taken, notes, performed_at
        FROM workout_sets
        WHERE session_id = bucket.session_id

  # Cardio intervals: one bucket per session owned by user
  user_cardio_intervals:
    parameters: SELECT id as session_id FROM workout_sessions WHERE user_id = token_parameters.user_id
    data:
      - SELECT id, session_id, interval_number, duration_seconds,
               distance_meters, pace_seconds_per_km, heart_rate, performed_at
        FROM cardio_intervals
        WHERE session_id = bucket.session_id

  # Template exercises: one bucket per template owned by user
  user_template_exercises:
    parameters: SELECT id as template_id FROM workout_templates WHERE user_id = token_parameters.user_id
    data:
      - SELECT id, template_id, exercise_id, order_index,
               target_sets, target_reps, target_weight, rest_seconds, notes
        FROM workout_template_exercises
        WHERE template_id = bucket.template_id

  # =====================================================
  # GLOBAL DATA (read-only, shared across all users)
  # =====================================================
  global_data:
    data:
      # System exercises (not custom)
      - SELECT id, name_fr, name_en, aliases, description, movement_pattern,
               exercise_type, muscle_group, primary_muscles, secondary_muscles,
               stabilizers, equipment, equipment_alternatives, good_for, bad_for,
               modifications, goal_scores, morpho_protocols, programming_priority,
               rest_modifiers, tempo_recommendations, synergies, antagonists,
               contraindications, volume_landmarks, difficulty, technique_cues,
               common_mistakes, instructions, source, image_url, video_url,
               is_custom, created_by, created_at, morphotype_recommendations
        FROM exercises
        WHERE is_custom = false

      # Achievements (global catalog)
      - SELECT id, key, name_fr, description_fr, icon, xp_reward,
               category, requirement, is_secret
        FROM achievements

      # Food cravings (global)
      - SELECT id, name_fr, icon, default_food_id, estimated_calories,
               category, is_active
        FROM food_cravings

      # Verified foods (global catalog)
      - SELECT id, name_fr, name_en, brand, barcode, calories, protein,
               carbohydrates, fat, fiber, sugar, sodium, serving_size,
               serving_unit, is_custom, created_by, verified, created_at
        FROM foods
        WHERE verified = true

      # Morpho questions (global)
      - SELECT id, question_key, question_text_fr, question_type,
               options, order_index, is_active
        FROM morpho_questions

  # =====================================================
  # USER CUSTOM DATA (exercises & foods created by user)
  # =====================================================
  user_custom:
    parameters: SELECT token_parameters.user_id as user_id
    data:
      # Custom exercises created by this user
      - SELECT id, name_fr, name_en, aliases, description, movement_pattern,
               exercise_type, muscle_group, primary_muscles, secondary_muscles,
               stabilizers, equipment, equipment_alternatives, good_for, bad_for,
               modifications, goal_scores, morpho_protocols, programming_priority,
               rest_modifiers, tempo_recommendations, synergies, antagonists,
               contraindications, volume_landmarks, difficulty, technique_cues,
               common_mistakes, instructions, source, image_url, video_url,
               is_custom, created_by, created_at, morphotype_recommendations
        FROM exercises
        WHERE is_custom = true AND created_by = bucket.user_id

      # Custom foods created by this user (unverified)
      - SELECT id, name_fr, name_en, brand, barcode, calories, protein,
               carbohydrates, fat, fiber, sugar, sodium, serving_size,
               serving_unit, is_custom, created_by, verified, created_at
        FROM foods
        WHERE verified = false AND created_by = bucket.user_id
